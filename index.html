<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaEasyTranslator v10</title>

  <!-- Tesseract OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.4/dist/tesseract.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════════ -->
  <header id="header">
    <div class="logo">
      <span class="logo-icon">📖</span>
      <span>Manga<span class="accent">Easy</span>Translator</span>
      <span class="ver">v10</span>
    </div>

    <div class="header-sep"></div>

    <button id="btn-new"  class="btn" data-i18n="btnNew">↺ Nova</button>
    <button id="btn-save" class="btn" data-i18n="btnSave">💾 Salvar</button>
    <button id="btn-load" class="btn" data-i18n="btnLoad">📂 Carregar</button>
    <input  id="project-file-input" type="file" accept=".met10,.json" style="display:none" />

    <div class="header-sep"></div>

    <button id="btn-ocr-all"   class="btn" data-i18n="btnOcrAll"   disabled>🔍 OCR</button>
    <button id="btn-trans-all" class="btn" data-i18n="btnTransAll" disabled>🌐 Traduzir</button>

    <div class="header-sep"></div>

    <button id="btn-undo" class="btn btn-icon" title="Ctrl+Z" disabled>↩</button>
    <button id="btn-redo" class="btn btn-icon" title="Ctrl+Y" disabled>↪</button>

    <div class="header-spacer"></div>

    <button id="btn-lang"   class="btn">🌐 EN</button>
    <button id="btn-export" class="btn btn-primary" data-i18n="btnExport" disabled>⬇ Exportar PNG</button>
  </header>

  <!-- ═══════════════════════════════════════════════════════
       LEFT TOOLBAR
  ═══════════════════════════════════════════════════════ -->
  <aside id="toolbar">

    <!-- Selection tools -->
    <button class="tool-btn active" data-tool="select" title="Selecionar (S)">⬚</button>
    <button class="tool-btn" data-tool="lasso"  title="Laço (L)">🔴</button>
    <button class="tool-btn" data-tool="stroke" title="Linha OCR (K)">📏</button>

    <div class="tool-sep"></div>

    <!-- Paint tools -->
    <button class="tool-btn" data-tool="brush"  title="Pincel (B)">🖌</button>
    <button class="tool-btn" data-tool="eraser" title="Borracha (E)">⬜</button>
    <button class="tool-btn" data-tool="clone"  title="Clone (C)">🔁</button>

    <div class="tool-sep"></div>

    <!-- Navigation -->
    <button class="tool-btn" data-tool="pan" title="Mover (Space)">✋</button>
    <button id="btn-fit" class="tool-btn" title="Ajustar (0)">⊡</button>

  </aside>

  <!-- ═══════════════════════════════════════════════════════
       CANVAS STAGE
  ═══════════════════════════════════════════════════════ -->
  <main id="canvas-stage">

    <!-- Drop zone (shown when no image loaded) -->
    <div id="drop-zone">
      <div class="drop-zone-icon">🖼</div>
      <div class="drop-zone-label" data-i18n="statusDrop">Arraste uma imagem ou clique para abrir</div>
      <div class="drop-zone-hint">PNG, JPG, WEBP</div>
      <input id="file-input" type="file" accept="image/*" style="display:none" />
    </div>

    <!-- Canvas world (transformed) -->
    <div id="canvas-world">
      <canvas id="base-canvas"></canvas>
      <canvas id="inpaint-canvas" style="display:none"></canvas>
      <canvas id="selection-canvas"></canvas>
      <canvas id="preview-canvas"></canvas>
      <div id="text-layer"></div>
      <canvas id="overlay-canvas"></canvas>
    </div>

    <!-- Zoom bar -->
    <div id="zoom-bar">
      <button id="btn-zoom-out" class="btn-icon" style="font-size:14px">−</button>
      <input id="zoom-range" type="range" min="5" max="800" value="100" />
      <span id="zoom-val">100%</span>
      <button id="btn-zoom-in" class="btn-icon" style="font-size:14px">+</button>
    </div>

  </main>

  <!-- Selection floating toolbar — rendered outside canvas-stage for z-index -->
  <div id="sel-toolbar" class="hidden">
    <button id="btn-sel-ocr"     class="sel-action-btn ocr">     🔍 <span data-i18n="actionOcr">OCR</span></button>
    <button id="btn-sel-clean"   class="sel-action-btn clean">   🧹 <span data-i18n="actionClean">Limpar</span></button>
    <button id="btn-sel-inpaint" class="sel-action-btn inpaint"> 🎨 <span data-i18n="actionInpaint">Inpaint</span></button>
    <button id="btn-sel-text"    class="sel-action-btn text">    📝 <span data-i18n="actionText">Texto</span></button>
    <button id="btn-sel-clear"   class="sel-action-btn clear">   ✕</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT PANEL
  ═══════════════════════════════════════════════════════ -->
  <aside id="panel-right">

    <!-- Tabs -->
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="settings">⚙ Config</button>
      <button class="panel-tab"        data-tab="blocks">📝 Caixas</button>
    </div>

    <!-- Settings tab -->
    <div class="panel-content active" id="tab-settings">

      <div class="section">
        <div class="section-title" data-i18n="secOcr">OCR</div>
        <div class="field">
          <label data-i18n="lblSrcLang">Idioma de origem</label>
          <select id="ocr-lang">
            <optgroup label="Asiático">
              <option value="jpn">Japonês</option>
              <option value="chi_sim">Chinês Simpl.</option>
              <option value="chi_tra">Chinês Trad.</option>
              <option value="kor">Coreano</option>
            </optgroup>
            <optgroup label="Latino">
              <option value="eng">Inglês</option>
              <option value="por">Português</option>
              <option value="spa">Espanhol</option>
              <option value="fra">Francês</option>
              <option value="deu">Alemão</option>
              <option value="ita">Italiano</option>
              <option value="rus">Russo</option>
            </optgroup>
            <optgroup label="Outros">
              <option value="ind">Indonésio</option>
              <option value="vie">Vietnamita</option>
              <option value="tha">Tailandês</option>
              <option value="ara">Árabe</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>Modo OCR</label>
          <select id="ocr-psm">
            <option value="11" data-i18n="psmAuto">Automático (PSM 11)</option>
            <option value="6"  data-i18n="psmBlock">Bloco (PSM 6)</option>
            <option value="7"  data-i18n="psmLine">Linha (PSM 7)</option>
            <option value="8"  data-i18n="psmWord">Palavra (PSM 8)</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="secTranslate">Tradução</div>
        <div class="field">
          <label data-i18n="lblDstLang">Idioma de destino</label>
          <select id="trans-lang">
            <option value="pt">Português</option>
            <option value="en">Inglês</option>
            <option value="es">Espanhol</option>
            <option value="fr">Francês</option>
            <option value="de">Alemão</option>
            <option value="it">Italiano</option>
            <option value="ru">Russo</option>
            <option value="zh">Chinês</option>
            <option value="ko">Coreano</option>
            <option value="id">Indonésio</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="secTools">Ferramentas</div>
        <div class="field">
          <label data-i18n="lblBrushSize">Tamanho do pincel</label>
          <div class="range-group">
            <input id="tool-size" type="range" min="2" max="120" value="20" />
            <span class="range-val" id="tool-size-val">20</span>
          </div>
        </div>
        <div class="field">
          <label>Cor</label>
          <input id="tool-color" type="color" value="#ffffff" style="width:100%;height:28px;padding:1px;cursor:pointer;border-radius:4px;" />
        </div>
        <div class="field">
          <label data-i18n="lblThreshold">Limiar inpaint text</label>
          <div class="range-group">
            <input id="inpaint-threshold" type="range" min="30" max="200" value="85" />
            <span class="range-val" id="inpaint-threshold-val">85</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Ações rápidas</div>
        <button id="btn-ocr-all-2"   class="action-btn" disabled>🔍 OCR completo da página</button>
        <button id="btn-trans-all-2" class="action-btn" disabled>🌐 Traduzir todos os blocos</button>
        <button id="btn-clear-all"   class="action-btn" style="color:var(--c-danger)">🗑 Remover todas as caixas</button>
      </div>

    </div>

    <!-- Blocks tab -->
    <div class="panel-content" id="tab-blocks">
      <div id="block-list"></div>
    </div>

    <!-- Box editor (bottom of right panel, shown when a block is selected) -->
    <div id="box-editor" class="hidden"></div>

  </aside>

</div><!-- #app -->

<script type="module" src="js/app.js"></script>

<script>
// ── Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll('.panel-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    const target = document.getElementById('tab-' + tab.dataset.tab);
    if (target) target.classList.add('active');
  });
});

// ── Zoom buttons ───────────────────────────────────────────────────────────
document.getElementById('btn-zoom-in')?.addEventListener('click', () => {
  const r = document.getElementById('zoom-range');
  if (r) { r.value = Math.min(800, parseInt(r.value) + 20); r.dispatchEvent(new Event('input')); }
});
document.getElementById('btn-zoom-out')?.addEventListener('click', () => {
  const r = document.getElementById('zoom-range');
  if (r) { r.value = Math.max(5, parseInt(r.value) - 20); r.dispatchEvent(new Event('input')); }
});

// ── Tool size / color (wired before app.js fully loads) ────────────────────
document.getElementById('tool-size')?.addEventListener('input', e => {
  document.getElementById('tool-size-val').textContent = e.target.value;
  // Will be picked up by renderer via a custom event
  document.dispatchEvent(new CustomEvent('met:toolsize', { detail: parseInt(e.target.value) }));
});
document.getElementById('tool-color')?.addEventListener('input', e => {
  document.dispatchEvent(new CustomEvent('met:toolcolor', { detail: e.target.value }));
});
document.getElementById('inpaint-threshold')?.addEventListener('input', e => {
  document.getElementById('inpaint-threshold-val').textContent = e.target.value;
  document.dispatchEvent(new CustomEvent('met:threshold', { detail: parseInt(e.target.value) }));
});

// ── Keyboard tool shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const map = { s:'select', l:'lasso', k:'stroke', b:'brush', e:'eraser', c:'clone' };
  const tool = map[e.key.toLowerCase()];
  if (tool) {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tool === tool);
    });
    document.dispatchEvent(new CustomEvent('met:tool', { detail: tool }));
  }
  if (e.key === ' ') {
    e.preventDefault();
    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tool === 'pan');
    });
    document.dispatchEvent(new CustomEvent('met:tool', { detail: 'pan' }));
  }
});

// ── btn-clear-all ──────────────────────────────────────────────────────────
document.getElementById('btn-clear-all')?.addEventListener('click', () => {
  document.dispatchEvent(new CustomEvent('met:clearall'));
});

// ── Mirror btn-ocr-all-2 / btn-trans-all-2 ────────────────────────────────
document.getElementById('btn-ocr-all-2')?.addEventListener('click', () =>
  document.getElementById('btn-ocr-all')?.click());
document.getElementById('btn-trans-all-2')?.addEventListener('click', () =>
  document.getElementById('btn-trans-all')?.click());
</script>

</body>
</html>
