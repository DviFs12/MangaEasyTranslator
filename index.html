<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaEasyTranslator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📖</span>
      <span class="logo-text">Manga<span class="accent">Easy</span>Translator</span>
    </div>
    <div class="header-actions">
      <button id="btn-new" class="btn btn-ghost" title="Nova imagem">↺ Nova Imagem</button>
      <button id="btn-export" class="btn btn-primary" disabled title="Exportar imagem final">⬇ Exportar</button>
    </div>
  </div>
</header>

<!-- STEP INDICATOR -->
<div class="steps-bar">
  <div class="step active" data-step="1"><span class="step-num">1</span><span class="step-label">Upload</span></div>
  <div class="step-sep">›</div>
  <div class="step" data-step="2"><span class="step-num">2</span><span class="step-label">OCR</span></div>
  <div class="step-sep">›</div>
  <div class="step" data-step="3"><span class="step-num">3</span><span class="step-label">Tradução</span></div>
  <div class="step-sep">›</div>
  <div class="step" data-step="4"><span class="step-num">4</span><span class="step-label">Edição</span></div>
  <div class="step-sep">›</div>
  <div class="step" data-step="5"><span class="step-num">5</span><span class="step-label">Exportar</span></div>
</div>

<!-- MAIN APP -->
<main class="app-layout">

  <!-- LEFT: TOOLS PANEL -->
  <aside class="panel panel-tools" id="tools-panel">
    <section class="tool-section" id="section-ocr">
      <h3 class="tool-title">🔍 OCR</h3>
      <div class="tool-group">
        <label class="tool-label">Idioma de origem</label>
        <select id="ocr-lang" class="tool-select">
          <option value="jpn">Japonês</option>
          <option value="eng">Inglês</option>
          <option value="chi_sim">Chinês Simplificado</option>
          <option value="kor">Coreano</option>
        </select>
      </div>
      <button id="btn-run-ocr" class="btn btn-accent btn-full" disabled>
        <span class="btn-icon">🔍</span> Detectar Texto
      </button>
      <div id="ocr-status" class="status-box hidden"></div>
    </section>

    <section class="tool-section" id="section-translate">
      <h3 class="tool-title">🌐 Tradução</h3>
      <div class="tool-group">
        <label class="tool-label">Idioma destino</label>
        <select id="trans-lang" class="tool-select">
          <option value="pt">Português</option>
          <option value="en">Inglês</option>
          <option value="es">Espanhol</option>
          <option value="fr">Francês</option>
        </select>
      </div>
      <button id="btn-translate-all" class="btn btn-accent btn-full" disabled>
        <span class="btn-icon">🌐</span> Traduzir Tudo
      </button>
      <div id="trans-status" class="status-box hidden"></div>
    </section>

    <section class="tool-section" id="section-brush">
      <h3 class="tool-title">🖌 Pincel de Apagar</h3>
      <div class="tool-group">
        <label class="tool-label">Modo</label>
        <div class="btn-group">
          <button class="btn btn-tool active" id="brush-white" data-mode="white">Branco</button>
          <button class="btn btn-tool" id="brush-blur" data-mode="blur">Blur</button>
          <button class="btn btn-tool" id="brush-clone" data-mode="clone">Clone</button>
        </div>
      </div>
      <div class="tool-group">
        <label class="tool-label">Tamanho: <span id="brush-size-val">20</span>px</label>
        <input type="range" id="brush-size" min="5" max="80" value="20" class="tool-range" />
      </div>
      <div class="tool-group">
        <label class="tool-label">Cor de fundo</label>
        <input type="color" id="brush-color" value="#ffffff" class="tool-color" />
      </div>
      <div class="btn-group" style="margin-top:8px">
        <button id="btn-brush-tool" class="btn btn-tool" data-active="false">✏ Ativar Pincel</button>
        <button id="btn-undo" class="btn btn-tool">↩ Desfazer</button>
      </div>
    </section>

    <section class="tool-section" id="section-text">
      <h3 class="tool-title">📝 Texto</h3>
      <div class="tool-group">
        <label class="tool-label">Adicionar texto</label>
        <input type="text" id="new-text-input" class="tool-input" placeholder="Digite o texto..." />
      </div>
      <div class="tool-group row">
        <div>
          <label class="tool-label">Fonte</label>
          <select id="font-family" class="tool-select small">
            <option value="Bangers">Bangers</option>
            <option value="Nunito">Nunito</option>
            <option value="Arial">Arial</option>
            <option value="Comic Sans MS">Comic Sans</option>
            <option value="Impact">Impact</option>
          </select>
        </div>
        <div>
          <label class="tool-label">Tamanho</label>
          <input type="number" id="font-size" value="18" min="8" max="120" class="tool-input small" />
        </div>
      </div>
      <div class="tool-group row">
        <div>
          <label class="tool-label">Cor texto</label>
          <input type="color" id="text-color" value="#000000" class="tool-color" />
        </div>
        <div>
          <label class="tool-label">Fundo</label>
          <input type="color" id="text-bg" value="#ffffff" class="tool-color" />
        </div>
        <div>
          <label class="tool-label">Opacidade bg</label>
          <input type="range" id="text-bg-opacity" min="0" max="1" step="0.05" value="0.85" class="tool-range" style="width:60px" />
        </div>
      </div>
      <div class="tool-group">
        <label class="tool-label">Alinhamento</label>
        <div class="btn-group">
          <button class="btn btn-tool active" data-align="left">⬅</button>
          <button class="btn btn-tool" data-align="center">↔</button>
          <button class="btn btn-tool" data-align="right">➡</button>
        </div>
      </div>
      <button id="btn-add-text" class="btn btn-accent btn-full" disabled>
        + Adicionar ao Canvas
      </button>
    </section>

    <section class="tool-section" id="section-canvas-ctrl">
      <h3 class="tool-title">🔭 Visualização</h3>
      <div class="tool-group">
        <label class="tool-label">Zoom: <span id="zoom-val">100</span>%</label>
        <input type="range" id="zoom-range" min="20" max="300" value="100" class="tool-range" />
      </div>
      <div class="btn-group">
        <button id="btn-fit" class="btn btn-tool">⊡ Ajustar</button>
        <button id="btn-zoom-reset" class="btn btn-tool">100%</button>
      </div>
    </section>
  </aside>

  <!-- CENTER: CANVAS AREA -->
  <div class="canvas-container" id="canvas-container">
    <!-- Upload drop zone -->
    <div class="drop-zone" id="drop-zone">
      <div class="drop-content">
        <div class="drop-icon">📄</div>
        <p class="drop-title">Arraste uma página de mangá aqui</p>
        <p class="drop-sub">ou clique para selecionar</p>
        <button class="btn btn-primary btn-lg">Selecionar Imagem</button>
        <p class="drop-hint">Suporte: JPG, PNG, WebP</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
    </div>

    <!-- Canvas wrapper (hidden until image loaded) -->
    <div class="canvas-wrapper hidden" id="canvas-wrapper">
      <canvas id="base-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div id="text-layer"></div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
      <div class="loading-card">
        <div class="spinner"></div>
        <p id="loading-msg">Processando...</p>
        <div class="progress-bar"><div id="progress-fill"></div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: TEXT BLOCKS PANEL -->
  <aside class="panel panel-blocks" id="blocks-panel">
    <div class="panel-header">
      <h3 class="tool-title">📋 Blocos de Texto</h3>
      <span class="badge" id="block-count">0</span>
    </div>
    <div id="blocks-list" class="blocks-list">
      <p class="empty-hint">Nenhum texto detectado ainda.</p>
    </div>
  </aside>

</main>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast hidden"></div>

<!-- SCRIPTS -->
<script type="module" src="js/app.js"></script>
</body>
</html>
